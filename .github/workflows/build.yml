name: Build APK Moely

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'  # Versi stabil, bukan 3.24
          channel: 'stable'

      - name: Create Flutter project
        run: |
          flutter create --org com.moely --project-name moely_app moely_app
          cd moely_app

      - name: Setup pubspec.yaml
        run: |
          cd moely_app
          cat > pubspec.yaml << 'EOF'
          name: moely_app
          description: Moely AI Chatbot
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            tflite_flutter: ^0.10.4
            permission_handler: ^10.4.3
          dev_dependencies:
            flutter_test:
              sdk: flutter
          flutter:
            uses-material-design: true
          EOF

      - name: Setup main.dart
        run: |
          cd moely_app/lib
          cat > main.dart << 'EOF'
          import 'dart:convert';
          import 'dart:io';
          import 'package:flutter/material.dart';
          import 'package:tflite_flutter/tflite_flutter.dart';
          import 'package:permission_handler/permission_handler.dart';

          void main() async {
            WidgetsFlutterBinding.ensureInitialized();
            await [Permission.storage].request();
            runApp(const MoelyApp());
          }

          class MoelyApp extends StatelessWidget {
            const MoelyApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'Moely AI',
                debugShowCheckedModeBanner: false,
                theme: ThemeData.dark(),
                home: const ChatScreen(),
              );
            }
          }

          class ChatScreen extends StatefulWidget {
            const ChatScreen({super.key});
            @override
            ChatScreenState createState() => ChatScreenState();
          }

          class ChatScreenState extends State<ChatScreen> {
            Interpreter? _interpreter;
            Map<String, dynamic> _vocab = {};
            Map<String, String> _food = {};
            bool _loading = true;
            final TextEditingController _ctrl = TextEditingController();
            final List<Map<String, String>> _messages = [];

            @override
            void initState() {
              super.initState();
              _load();
            }

            Future<void> _load() async {
              try {
                final dir = Directory('/storage/emulated/0/Moely');
                if (!await dir.exists()) {
                  await dir.create(recursive: true);
                  setState(() {
                    _loading = false;
                    _messages.add({'bot': '📁 Folder Moely dibuat. Masukkan file:\n- model.tflite\n- vocab.json\n- makanan.json'});
                  });
                  return;
                }
                final modelFile = File('${dir.path}/model.tflite');
                final vocabFile = File('${dir.path}/vocab.json');
                final foodFile = File('${dir.path}/makanan.json');
                
                if (!await modelFile.exists() || !await vocabFile.exists()) {
                  setState(() {
                    _loading = false;
                    _messages.add({'bot': '❌ File model.tflite atau vocab.json tidak ditemukan di folder Moely.'});
                  });
                  return;
                }
                
                _interpreter = await Interpreter.fromFile(modelFile);
                String vJson = await vocabFile.readAsString();
                _vocab = json.decode(vJson);
                
                if (await foodFile.exists()) {
                  String fJson = await foodFile.readAsString();
                  _food = Map<String,String>.from(json.decode(fJson));
                }
                
                setState(() {
                  _loading = false;
                  _messages.add({'bot': '✅ Moely siap! Silakan bertanya.'});
                });
              } catch (e) {
                setState(() {
                  _loading = false;
                  _messages.add({'bot': 'Error: $e'});
                });
              }
            }

            String _generate(String prompt) {
              if (_interpreter == null) return "Model error";
              try {
                final char2idx = Map<String,int>.from(_vocab['char2idx'] ?? {});
                final idx2char = List<String>.from(_vocab['idx2char'] ?? []);
                final vocabSize = _vocab['vocab_size'] ?? 0;
                final seqLen = _vocab['seq_length'] ?? 5;
                if (char2idx.isEmpty || idx2char.isEmpty) return "?";
                
                String lastChars = prompt.length >= seqLen ? prompt.substring(prompt.length - seqLen) : prompt.padLeft(seqLen, ' ');
                List<int> ids = lastChars.split('').map((c) => char2idx[c] ?? 0).toList();
                List<double> input = List.filled(seqLen * vocabSize, 0.0);
                for (int i=0; i<seqLen; i++) {
                  if (i < ids.length) input[i*vocabSize + ids[i]] = 1.0;
                }
                var output = List.filled(vocabSize, 0.0);
                _interpreter!.run(input, output);
                
                int nextIdx = 0;
                double maxVal = -1e9;
                for (int i=0; i<output.length; i++) {
                  if (output[i] > maxVal) { maxVal = output[i]; nextIdx = i; }
                }
                if (nextIdx < 0 || nextIdx >= idx2char.length) return "?";
                return idx2char[nextIdx];
              } catch (e) {
                return "?";
              }
            }

            void _send() async {
              String q = _ctrl.text.trim();
              if (q.isEmpty) return;
              setState(() {
                _messages.add({'user': q});
                _ctrl.clear();
              });
              
              String? ans;
              for (var entry in _food.entries) {
                if (q.toLowerCase().contains(entry.key.toLowerCase())) {
                  ans = entry.value;
                  break;
                }
              }
              
              if (ans == null) {
                String result = "";
                String context = q;
                for (int i=0; i<30; i++) {
                  String next = _generate(context);
                  if (next == "\n" || next == "" || next == "?") break;
                  result += next;
                  if (result.length > 100) break;
                  context = (context + next).length > 50 ? (context + next).substring((context+next).length-50) : context+next;
                }
                ans = result.trim().isEmpty ? "Maaf kurang paham." : result;
              }
              setState(() => _messages.add({'bot': ans!}));
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: const Text('Moely AI'), backgroundColor: Colors.black),
                body: _loading
                    ? const Center(child: CircularProgressIndicator())
                    : Column(children: [
                        Expanded(
                          child: ListView.builder(
                            padding: const EdgeInsets.all(8),
                            itemCount: _messages.length,
                            itemBuilder: (ctx, i) {
                              bool isUser = _messages[i].containsKey('user');
                              return Align(
                                alignment: isUser ? Alignment.centerRight : Alignment.centerLeft,
                                child: Container(
                                  margin: const EdgeInsets.symmetric(vertical: 4, horizontal: 8),
                                  padding: const EdgeInsets.symmetric(horizontal: 14, vertical: 10),
                                  decoration: BoxDecoration(
                                    color: isUser ? Colors.blueAccent : Colors.grey[800],
                                    borderRadius: BorderRadius.circular(20),
                                  ),
                                  child: Text(_messages[i][isUser ? 'user' : 'bot']!),
                                ),
                              );
                            },
                          ),
                        ),
                        Container(
                          padding: const EdgeInsets.all(8),
                          decoration: BoxDecoration(color: Colors.grey[900], borderRadius: BorderRadius.circular(30)),
                          margin: const EdgeInsets.all(8),
                          child: Row(children: [
                            Expanded(
                              child: TextField(
                                controller: _ctrl,
                                style: const TextStyle(color: Colors.white),
                                decoration: const InputDecoration(hintText: 'Ketik...', border: InputBorder.none),
                                onSubmitted: (_) => _send(),
                              ),
                            ),
                            IconButton(icon: const Icon(Icons.send, color: Colors.cyanAccent), onPressed: _send),
                          ]),
                        )
                      ]),
              );
            }
          }
          EOF

      - name: Update Android manifest for storage permission
        run: |
          cd moely_app/android/app/src/main
          sed -i 's/<application/<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"\/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"\/>\n    <application/' AndroidManifest.xml

      - name: Get dependencies
        run: |
          cd moely_app
          flutter pub get

      - name: Build APK
        run: |
          cd moely_app
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Moely-APK
          path: moely_app/build/app/outputs/flutter-apk/*.apk
